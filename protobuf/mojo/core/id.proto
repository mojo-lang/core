syntax = "proto3";

package mojo.core;

option go_package = "github.com/mojo-lang/core/go/pkg/core;core";

option java_multiple_files = true;
option java_outer_classname = "IdProto";
option java_package = "org.mojolang.mojo.core";

message Id {
    option (gogoproto.onlyone) = true;
    
    uint64 integer_id = 1;
    string  string_id = 2;
    bytes     uuid_id = 3;
}